events { worker_connections 1024; }

http {
    # ── Configuración general ──────────────────────────────────────────────────
    sendfile on;
    client_max_body_size 200M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Upstream ───────────────────────────────────────────────────────────────
    upstream odoo      { server odoo:8069; }
    upstream odoo-chat { server odoo:8072; }
    upstream n8n       { server n8n:5678; }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name erp.tudominio.com n8n.tudominio.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── ODOO ──────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name erp.tudominio.com;

        ssl_certificate     /etc/letsencrypt/live/erp.tudominio.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/erp.tudominio.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # Web client (longpoll)
        location /websocket {
            proxy_pass http://odoo-chat;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location / {
            proxy_pass http://odoo;
            proxy_redirect off;
        }

        # Archivos estáticos con cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://odoo;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }

    # ── n8n ────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name n8n.tudominio.com;

        ssl_certificate     /etc/letsencrypt/live/n8n.tudominio.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/n8n.tudominio.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://n8n;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            chunked_transfer_encoding on;
        }
    }
}
