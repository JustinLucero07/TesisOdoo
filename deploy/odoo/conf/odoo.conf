[options]
; ── Base de datos ──────────────────────────────────────────────────────────────
db_host = db
db_port = 5432
db_user = odoo
db_password = ${POSTGRES_PASSWORD}
db_name = inmobi_produccion
db_maxconn = 64

; ── Módulos ────────────────────────────────────────────────────────────────────
addons_path = /opt/odoo-src/addons,/opt/odoo-src/odoo/addons,/opt/odoo-addons

; ── Servidor ───────────────────────────────────────────────────────────────────
http_interface = 0.0.0.0
http_port = 8069
longpolling_port = 8072
proxy_mode = True

; ── Seguridad ─────────────────────────────────────────────────────────────────
admin_passwd = ${ODOO_ADMIN_PASSWD}
list_db = False

; ── Workers (ajustar según CPUs de la VPS) ────────────────────────────────────
; workers = 4
; max_cron_threads = 2

; ── Logs ──────────────────────────────────────────────────────────────────────
logfile = /var/log/odoo/odoo.log
log_level = warn

; ── Almacenamiento ────────────────────────────────────────────────────────────
data_dir = /var/lib/odoo
